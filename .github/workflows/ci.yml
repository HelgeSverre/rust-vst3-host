name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Primary platform: full workspace, formatting, lint, tests, examples.
  macos:
    name: macOS (full)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --workspace --all-features --examples

  # The published crate must build and pass its tests on Linux (incl. the X11/XCB path).
  linux:
    name: Linux (vst3-host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install build deps (libclang, libxcb, ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang libxcb1-dev libxcb-util-dev libasound2-dev pkg-config
      - run: cargo build -p vst3-host --all-features
      - run: cargo test -p vst3-host --all-features
      - run: cargo clippy -p vst3-host --all-features -- -D warnings

  # The published crate must at least build on Windows. LLVM is kept for any -sys
  # dependency that still runs bindgen (e.g. via cpal).
  windows:
    name: Windows (vst3-host)
    runs-on: windows-latest
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install LLVM
        run: choco install llvm -y
      - run: cargo build -p vst3-host
