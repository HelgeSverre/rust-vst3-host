name: CI

on:
  push:
    branches: [main, "feature/**", "roadmap/**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Primary platform: full workspace, formatting, lint (incl. tests/examples), tests, examples.
  macos:
    name: macOS (full)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-features --all-targets -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --workspace --all-features --examples
      # Keep the isolation path + a no-plugin example building.
      - run: cargo build -p vst3-host --bin vst3-host-helper --features process-isolation
      - run: cargo run -p vst3-host --example plugin_scanner

  # The published crate must build and pass its tests on Linux (incl. the X11/XCB path).
  linux:
    name: Linux (vst3-host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install build deps (libclang, libxcb, ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang libxcb1-dev libxcb-util-dev libasound2-dev pkg-config
      - run: cargo build -p vst3-host --all-features
      - run: cargo test -p vst3-host --all-features
      - run: cargo clippy -p vst3-host --all-features --all-targets -- -D warnings

  asan-lsan:
    name: "ci: AddressSanitizer + LeakSanitizer"
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-Zsanitizer=address -Clink-arg=-Wl,--export-dynamic"
      RUSTDOCFLAGS: "-Zsanitizer=address -Clink-arg=-Wl,--export-dynamic"
      ASAN_OPTIONS: "detect_leaks=1:verify_asan_link_order=0"
      CARGO_TARGET_DIR: target/asan
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install build deps (libclang, libxcb, ALSA)
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang libxcb1-dev libxcb-util-dev libasound2-dev pkg-config
      - name: Build ASan-instrumented TestSynth fixture
        run: |
          cargo +nightly build -p vst3-host-testplug -Zbuild-std --target x86_64-unknown-linux-gnu
          mkdir -p test_plugins/TestSynth.vst3/Contents/x86_64-linux
          cp target/asan/x86_64-unknown-linux-gnu/debug/libvst3_host_testplug.so \
            test_plugins/TestSynth.vst3/Contents/x86_64-linux/TestSynth.so
      - name: Build ASan-instrumented isolation helper
        run: cargo +nightly build -p vst3-host -Zbuild-std --target x86_64-unknown-linux-gnu --bin vst3-host-helper --features process-isolation
      - name: Sanitizer test suite
        run: cargo +nightly test -p vst3-host -Zbuild-std --target x86_64-unknown-linux-gnu
      - name: Sanitizer TestSynth load/process coverage
        env:
          VST3_HOST_HELPER_PATH: ${{ github.workspace }}/target/asan/x86_64-unknown-linux-gnu/debug/vst3-host-helper
        run: |
          cargo +nightly test -p vst3-host -Zbuild-std --target x86_64-unknown-linux-gnu --test feature_coverage_tests test_testsynth -- --ignored --nocapture --test-threads=1
          cargo +nightly test -p vst3-host -Zbuild-std --target x86_64-unknown-linux-gnu --test feature_coverage_tests test_note_expression_bends_pitch -- --ignored --nocapture --test-threads=1

  # Windows is the most regression-prone platform (DLL/module loading, paths) — build AND test.
  windows:
    name: Windows (vst3-host)
    runs-on: windows-latest
    env:
      LIBCLANG_PATH: C:\Program Files\LLVM\bin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install LLVM
        run: choco install llvm -y
      - run: cargo build -p vst3-host --all-features
      - run: cargo test -p vst3-host --all-features

  # MSRV: verify the declared rust-version (1.85) builds the default-feature crate.
  # (egui-widgets is intentionally excluded — egui/eframe 0.34 require Rust 1.92.)
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.85
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev clang libxcb1-dev libxcb-util-dev libasound2-dev pkg-config
      - run: cargo build -p vst3-host

  # docs.rs builds with --all-features and --cfg docsrs; catch doc/cfg breakage early.
  docs:
    name: docs.rs build
    runs-on: macos-latest
    env:
      RUSTDOCFLAGS: "--cfg docsrs -D warnings"
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - run: cargo doc -p vst3-host --all-features --no-deps

  # Feature-combination guard: cfg'd code paths must compile in isolation.
  features:
    name: Feature combos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p vst3-host --no-default-features
      - run: cargo build -p vst3-host --no-default-features --features cpal-backend
      - run: cargo build -p vst3-host --no-default-features --features process-isolation
      - run: cargo build -p vst3-host --no-default-features --features cpal-backend,egui-widgets

  # Dependency hygiene: advisories + license/ban policy (relevant after the MIT relicense).
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
